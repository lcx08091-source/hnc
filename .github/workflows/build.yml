name: Build HNC

# v3.5.0-beta1: 自动 CI/CD
#
# 触发:
#   - push 到 main 或 dev 分支
#   - PR 到 main
#   - 手动触发
#   - 打 tag(v3.5.0-beta1 等)→ 自动 release
#
# 做的事:
#   1. 用 NDK r26d 交叉编译 hotspotd + mdns_resolve → arm64-v8a static binary
#   2. 跑 daemon/test/ 下的 C 单元测试
#   3. 跑 test/run_all.sh 下的 shell 单元测试
#   4. 把编译好的 binary 放进 zip,打包模块
#   5. 如果是 tag push,自动创建 GitHub release
#
# 编译产物:
#   - hnc-${VERSION}-arm64.zip(可装的 KSU 模块)
#   - hotspotd(独立 binary,作为 release artifact 提供)
#   - mdns_resolve(独立 binary)
#
# 可在 GitHub repo Settings → Actions → 启用,然后 push 即可

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NDK_VERSION: r26d
  TARGET_API: 30
  TARGET_ABI: arm64-v8a

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shell unit tests
        run: |
          sh test/run_all.sh
          # 期望: ALL PASS: 64/64

      - name: Compile and run C unit tests
        run: |
          cd daemon/test
          gcc -Wall -Wextra -o test_mdns_parse test_mdns_parse.c
          ./test_mdns_parse
          # v3.6 Commit 2: test_hostname_helpers 现在 #include ../hnc_helpers.h
          # 需要 link ../hnc_helpers.c 才能解出 hnc_* 符号
          # v3.8.3 D3: hnc_helpers.c 现在 include oui_override.h,所有测试
          #            都要 link oui_override.c
          gcc -Wall -Wextra -I .. -o test_hostname_helpers \
              test_hostname_helpers.c ../hnc_helpers.c ../oui_override.c
          ./test_hostname_helpers
          # v3.8.1 A3: hostname_cache 单元测试
          gcc -Wall -Wextra -I .. -o test_hostname_cache \
              test_hostname_cache.c ../hostname_cache.c ../hnc_helpers.c \
              ../oui_override.c
          ./test_hostname_cache
          # v3.8.3 D3: oui_override 单元测试(新增 27 个)
          gcc -Wall -Wextra -I .. -o test_oui_override \
              test_oui_override.c ../oui_override.c
          ./test_oui_override
          # v3.8.2 B3 方案 G: 调用链真代码集成测试
          # 通过 #include "../hotspotd.c" + 同名 static mock 覆盖 I/O 函数,
          # 测试执行的是真实 resolve_hostname 机器码,不是 shim 重实现。
          # -Wno-unused-{function,variable}: hotspotd.c 里 main/nl_fd 等在
          # HNC_TEST_MODE 下不可用,但 extern 声明会触发未使用警告。
          gcc -Wall -Wextra -Wno-unused-parameter -Wno-unused-function \
              -Wno-unused-variable -I .. -o test_call_chain \
              test_call_chain.c ../hnc_helpers.c ../hostname_cache.c \
              ../oui_override.c
          ./test_call_chain

  build:
    name: Cross-compile binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ndk
          key: ndk-${{ env.NDK_VERSION }}

      - name: Setup NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          NDK_DIR="${{ runner.temp }}/ndk"
          mkdir -p "$NDK_DIR"
          cd "$NDK_DIR"
          NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
          wget -q "https://dl.google.com/android/repository/${NDK_ZIP}"
          unzip -q "$NDK_ZIP"
          rm "$NDK_ZIP"

      - name: Setup environment
        run: |
          NDK_ROOT="${{ runner.temp }}/ndk/android-ndk-${NDK_VERSION}"
          TOOLCHAIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          echo "NDK_ROOT=$NDK_ROOT" >> $GITHUB_ENV
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "CC=$TOOLCHAIN/bin/aarch64-linux-android${TARGET_API}-clang" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> $GITHUB_ENV

      - name: Cross-compile hotspotd (arm64-v8a static)
        run: |
          # v3.6 Commit 2: 编译 hotspotd.c + hnc_helpers.c
          # v3.8.1 A3: 新增 hostname_cache.c 持久化 DHCP/mDNS 识别结果
          $CC \
            -O2 \
            -Wall -Wextra -Wno-unused-parameter \
            -static \
            -o bin/hotspotd \
            daemon/hotspotd.c daemon/hnc_helpers.c daemon/hostname_cache.c
          $STRIP bin/hotspotd
          file bin/hotspotd
          ls -lh bin/hotspotd

      - name: Cross-compile mdns_resolve (arm64-v8a static)
        run: |
          $CC \
            -O2 \
            -Wall -Wextra \
            -static \
            -o bin/mdns_resolve \
            daemon/mdns_resolve.c
          $STRIP bin/mdns_resolve
          file bin/mdns_resolve
          ls -lh bin/mdns_resolve

      - name: Read version from module.prop
        id: version
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d= -f2)
          VERSION_CODE=$(grep '^versionCode=' module.prop | cut -d= -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building $VERSION ($VERSION_CODE)"

      - name: Package KSU module zip
        run: |
          ZIP_NAME="HNC-${{ steps.version.outputs.version }}-arm64.zip"
          # 排除 .git, .github, build artifacts, etc.
          zip -qr "$ZIP_NAME" . \
            -x "*.git*" \
            -x "*.github/*" \
            -x "*test_mdns_parse" \
            -x "*test_hostname_helpers" \
            -x "*.o" \
            -x "*.DS_Store"
          ls -lh "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload module zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: HNC-${{ steps.version.outputs.version }}-arm64
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: hnc-binaries-${{ steps.version.outputs.version }}
          path: |
            bin/hotspotd
            bin/mdns_resolve
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(grep '^version=' module.prop | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: HNC-${{ steps.version.outputs.version }}-arm64

      - name: Download binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: hnc-binaries-${{ steps.version.outputs.version }}
          path: bin/

      - name: Extract changelog for this version
        id: changelog
        run: |
          # 提取 CHANGELOG.md 里当前版本的 section
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## / {
              if (in_section) exit
              if ($0 ~ ver) { in_section = 1; print; next }
            }
            in_section { print }
          ' CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            HNC-${{ steps.version.outputs.version }}-arm64.zip
            bin/hotspotd
            bin/mdns_resolve
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
